<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Công Việc Cá Nhân</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;   /* Mượt trên iPhone */
    }

    .bg-img {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 30px 20px;
      max-width: 400px;
      margin: auto;
      top: 50%;
      transform: translateY(-50%);
      background: none;
    }

    h1 {
      color: brown;
      font-size: 28px;
      margin-bottom: 15px;
      -webkit-text-stroke: 0.5px white; 
    }

    h12 {
      display: block;
      color: black;
      font-weight: bold; 
      font-size: 28px;
      margin-bottom: 15px;
      -webkit-text-stroke: 0.5px white;
    }

    a {
      display: block;
      margin: 12px 0;
      padding: 14px 20px;
      background-color: #ADD8E6;
      color: red;
      text-decoration: none;
      border-radius: 10px;
      font-size: 20px;        
      -webkit-text-stroke: 0.5px brown;
      font-weight: bold;
      transition: background 0.3s ease;
      border: 2px solid brown;
    }

    a:hover {
      background-color: #ffe6e6;
    }
  </style>
</head>
<body>
  <img class="bg-img" src="qqq.gif" alt="Background GIF" />

  <div class="container">
    <h1>Các Mục Công Việc Của</h1>

    <a href="Uon nengkan.html" target="_blank">Uốn nengkan</a>
    <a href="Ghi gio tang ca.html" target="_blank">Ghi giờ tăng ca</a>
    <a href="Khoi luong ong.html" target="_blank">Tính khối lượng ống (파이프 무게 계산)</a>
    <a href="Khoi luong thep.html" target="_blank">Tính khối lượng thép H   (H형강 무게 계산)</a>
    <a href="Tinh ban kinh.html" target="_blank">Tính bán kính (반지름 계산) </a>
    <a href="Mua sam.html" target="_blank">Mua sắm</a> </div>
</body>
</html>
