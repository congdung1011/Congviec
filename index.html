<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Công Việc Cá Nhân</title>
  <style>
    body, html {
      margin: 0; padding: 0; height: 100%;
      overflow-y: auto; overflow-x: hidden;
      font-family: sans-serif;
    }

    .bg-img {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 30px 20px;
      max-width: 400px;
      margin: auto;
      top: 5%;
    }

    h1, h12 {
      color: white;
      font-size: 28px;
      margin: 5px 0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      -webkit-text-stroke: 0.5px black;
    }

    a {
      display: block;
      margin: 15px 0;
      padding: 16px 20px;
      text-decoration: none;
      border-radius: 15px;
      font-size: 18px;
      font-weight: bold;
      
      /* Màu chữ đỏ và viền trắng */
      color: red;
      -webkit-text-stroke: 0.5px white;
      
      /* Nền xanh phẳng */
      background-color: #add8e6;
      border: 1.5px solid red;
    }

    /* Đã loại bỏ các hiệu ứng hover, active, focus và animation */
  </style>
</head>
<body>
  <img class="bg-img" src="qqq.gif" alt="Background GIF" />

  <div class="container">
    <h1>Các Mục Công Việc Của</h1>
    <h12>PHAN CÔNG DŨNG</h12>

    <a href="Khoi luong ong.html" target="_blank">Tính khối lượng ống (파이프 계산)</a>
    <a href="Khoi luong thep.html" target="_blank">Tính khối lượng thép H (H 계산)</a>
    <a href="Tinh ban kinh.html" target="_blank">Tính bán kính (반지름 계산)</a>
    <a href="Mua sam.html" target="_blank">Mua sắm</a> 
  </div>
</body>
</html>
