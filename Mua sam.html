<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Mua Sắm</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 10px; background: #fdf5e6; margin: 0; }
    input, button, select { margin: 5px 0; padding: 12px; font-size: 16px; font-weight: bold; width: 100%; box-sizing: border-box; }
    
    /* Cấu hình bảng hiển thị ngang */
    #danhSachBang { width: 100%; overflow-x: auto; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; table-layout: auto; }
    
    th, td { 
      border: 1px solid #ccc; 
      padding: 6px 4px; 
      text-align: center; 
      /* Chữ tự co giãn theo màn hình */
      font-size: clamp(8px, 3vw, 14px); 
      white-space: nowrap; 
    }
    
    th { background: #e8f5e9; color: green; }
    .row-tong { background-color: #ffe4b5; font-weight: bold; color: red; }
    
    button { box-shadow: 0 4px 0 rgba(0,0,0,0.2); border-radius: 5px; cursor: pointer; transition: all 0.2s; }
    button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    
    .btn-ghi { background-color: orange; color: white; }
    .btn-xuat { background-color: brown; color: white; }
    .btn-xoa { background-color: red; color: white; padding: 2px 4px; font-size: 10px; }
    .btn-sua { background-color: blue; color: white; padding: 2px 4px; margin-bottom: 2px; font-size: 10px; }
    .error-text { color: red; font-weight: bold; }
  </style>
</head>
<body>

<div id="loginContainer" style="text-align: center; margin-top: 50px;">
  <h2>ĐĂNG NHẬP HỆ THỐNG</h2>
  <input type="email" id="txtEmail" placeholder="Email"><br>
  <input type="password" id="txtPassword" placeholder="Mật khẩu"><br>
  <button onclick="login()">Vào hệ thống</button>
  <p id="errorMessage" style="color: red;"></p>
</div>

<div id="noiDung" style="display: none;">
  <h2>Ghi Chép Mua Sắm</h2>
  <input type="date" id="ngay" />
  <input type="text" id="matHang" placeholder="Tên mặt hàng" />
  <input type="number" id="soTien" placeholder="Số tiền" />
  <input type="text" id="maSo" placeholder="Mã số" />
  
  <select id="donVi">
    <option value="VND (Việt Nam)">VND (Việt Nam)</option>
    <option value="USD (Hoa Kỳ)">USD (Hoa Kỳ)</option>
    <option value="EUR (Châu Âu)">EUR (Châu Âu)</option>
    <option value="JPY (Nhật Bản)">JPY (Nhật Bản)</option>
    <option value="KRW (Hàn Quốc)">KRW (Hàn Quốc)</option>
  </select>
  
  <button class="btn-ghi" id="btnGhi" onclick="themDuLieu()">Ghi lại</button>
  <button class="btn-xuat" onclick="xuatDuLieu()">Xuất file .json</button>
  <button class="btn-xuat" onclick="document.getElementById('fileInput').click()">Nhập file .json</button>
  <input type="file" id="fileInput" style="display: none;" accept=".json" onchange="nhapDuLieu(event)">
  
  <div id="danhSachBang"></div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC9mGXrWmaSAFfDGFbCrefl2ilx_7BFtvA",
    authDomain: "du-lieu-uon.firebaseapp.com",
    databaseURL: "https://du-lieu-uon-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "du-lieu-uon",
    storageBucket: "du-lieu-uon.firebasestorage.app",
    messagingSenderId: "783896796114",
    appId: "1:783896796114:web:050878959c3eac9909860b"
  };
  
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  let danhSach = [];
  let editingIndex = -1;

  document.getElementById('ngay').valueAsDate = new Date();

  function login() {
    const email = document.getElementById("txtEmail").value;
    const password = document.getElementById("txtPassword").value;
    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.SESSION)
      .then(() => firebase.auth().signInWithEmailAndPassword(email, password))
      .then(() => {
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("noiDung").style.display = "block";
        loadDataFromFirebase();
      })
      .catch(() => document.getElementById("errorMessage").innerText = "Sai tài khoản hoặc mật khẩu!");
  }

  function themDuLieu() {
    const ngay = document.getElementById('ngay').value;
    const matHang = document.getElementById('matHang').value;
    const soTien = parseFloat(document.getElementById('soTien').value);
    const maSo = document.getElementById('maSo').value;
    const donVi = document.getElementById('donVi').value;
    if(!ngay || !matHang || isNaN(soTien) || !maSo) return alert("Vui lòng nhập đầy đủ thông tin!");
    if (editingIndex === -1) {
      danhSach.push({ngay, matHang, soTien, maSo, donVi});
    } else {
      danhSach[editingIndex] = {ngay, matHang, soTien, maSo, donVi};
      editingIndex = -1;
      document.getElementById('btnGhi').innerText = "Ghi lại";
    }
    luuDuLieu();
    resetForm();
  }

  function resetForm() {
    document.getElementById('matHang').value = '';
    document.getElementById('soTien').value = '';
    document.getElementById('maSo').value = '';
  }

  function suaDong(index) {
    const item = danhSach[index];
    document.getElementById('ngay').value = item.ngay;
    document.getElementById('matHang').value = item.matHang;
    document.getElementById('soTien').value = item.soTien;
    document.getElementById('maSo').value = item.maSo;
    document.getElementById('donVi').value = item.donVi;
    editingIndex = index;
    document.getElementById('btnGhi').innerText = "Cập nhật";
  }

  function xoaDong(index) {
    if (confirm("Xóa mặt hàng này?")) {
      danhSach.splice(index, 1);
      luuDuLieu();
    }
  }

  function luuDuLieu() {
    database.ref('muasam').set(danhSach).then(hienThiBang);
  }

  function loadDataFromFirebase() {
    database.ref('muasam').once('value', snapshot => {
      danhSach = snapshot.val() || [];
      hienThiBang();
    });
  }

  function nhapDuLieu(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        if (confirm("Dữ liệu hiện tại sẽ bị thay thế bằng dữ liệu từ file. Bạn chắc chứ?")) {
          danhSach = data;
          luuDuLieu();
        }
      } catch (err) { alert("File không hợp lệ!"); }
    };
    reader.readAsText(file);
  }

  function hienThiBang() {
    const container = document.getElementById('danhSachBang');
    const nhomTheoMa = {};
    danhSach.forEach((item, index) => {
        if (!nhomTheoMa[item.maSo]) nhomTheoMa[item.maSo] = [];
        nhomTheoMa[item.maSo].push({...item, index});
    });
    let html = `<table><tr><th>Ngày</th><th>Mặt hàng</th><th>Tiền</th><th>ĐV</th><th>Mã</th><th>Thao tác</th></tr>`;
    for (let ma in nhomTheoMa) {
        let tong = 0;
        let donViDauTien = nhomTheoMa[ma][0].donVi;
        let coLoiDonVi = false;
        nhomTheoMa[ma].forEach(item => {
            html += `<tr><td>${item.ngay}</td><td>${item.matHang}</td><td>${item.soTien.toLocaleString()}</td><td>${item.donVi.split(' ')[0]}</td><td>${item.maSo}</td><td><button class="btn-sua" onclick="suaDong(${item.index})">Sửa</button><br><button class="btn-xoa" onclick="xoaDong(${item.index})">Xóa</button></td></tr>`;
            if (item.donVi !== donViDauTien) coLoiDonVi = true;
            tong += item.soTien;
        });
        // Đã sửa dòng dưới: Thêm hiển thị đơn vị tiền tệ vào phần Tổng
        html += `<tr class="row-tong"><td colspan="2">TỔNG ${ma}</td><td colspan="4">${coLoiDonVi ? `<span class="error-text">LỖI!</span>` : tong.toLocaleString() + ' ' + donViDauTien.split(' ')[0]}</td></tr>`;
    }
    html += `</table>`;
    container.innerHTML = html;
  }

  function xuatDuLieu() {
    const blob = new Blob([JSON.stringify(danhSach, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "mua_sam.json";
    a.click();
  }
</script>
</body>
</html>
