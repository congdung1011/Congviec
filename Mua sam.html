<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản Lý Mua Sắm</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; background: #fdf5e6; }
    input, button { margin: 5px; padding: 15px; font-size: 18px; }
    
    .btn-ghi { background-color: orange; color: white; border: none; cursor: pointer; }
    .btn-xuat { background-color: brown; color: white; border: none; cursor: pointer; }
    .btn-xoa { background-color: red; color: white; border: none; cursor: pointer; padding: 5px 10px; }

    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
    
    th { background: #e8f5e9; color: green; }
    .tong-ma { color: red; font-weight: bold; font-size: 20px; }
    .label-blue { color: black; font-weight: bold; }

    input[type="file"]::file-selector-button { color: blue; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

<div id="loginContainer" style="text-align: center; margin-top: 50px;">
  <h2>ĐĂNG NHẬP HỆ THỐNG MUA SẮM</h2>
  <input type="email" id="txtEmail" placeholder="Email"><br>
  <input type="password" id="txtPassword" placeholder="Mật khẩu"><br>
  <button onclick="login()">Vào hệ thống</button>
  <p id="errorMessage" style="color: red;"></p>
</div>

<div id="noiDung" style="display: none;">
  <h2>Ghi Chép Mua Sắm</h2>
  <input type="date" id="ngay" />
  <input type="text" id="matHang" placeholder="Tên mặt hàng" />
  <input type="number" id="soTien" placeholder="Số tiền" />
  <input type="text" id="maSo" placeholder="Mã số" />
  <br>
  <button class="btn-ghi" onclick="themDuLieu()">Ghi lại</button>
  <button class="btn-xuat" onclick="xuatDuLieu()">Xuất file .json</button>
  <br>
  <label class="label-blue">Restore dữ liệu: </label>
  <input type="file" id="restoreFile" accept=".json" onchange="restoreDuLieu(event)">

  <div id="danhSachBang"></div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC9mGXrWmaSAFfDGFbCrefl2ilx_7BFtvA",
    authDomain: "du-lieu-uon.firebaseapp.com",
    databaseURL: "https://du-lieu-uon-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "du-lieu-uon",
    storageBucket: "du-lieu-uon.firebasestorage.app",
    messagingSenderId: "783896796114",
    appId: "1:783896796114:web:050878959c3eac9909860b"
  };
  
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  let danhSach = [];

  document.getElementById('ngay').valueAsDate = new Date();

  function login() {
    const email = document.getElementById("txtEmail").value;
    const password = document.getElementById("txtPassword").value;
    firebase.auth().signInWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("noiDung").style.display = "block";
        loadDataFromFirebase();
      })
      .catch(() => document.getElementById("errorMessage").innerText = "Sai tài khoản hoặc mật khẩu!");
  }

  function themDuLieu() {
    const ngay = document.getElementById('ngay').value;
    const matHang = document.getElementById('matHang').value;
    const soTien = parseFloat(document.getElementById('soTien').value);
    const maSo = document.getElementById('maSo').value;

    if(!ngay || !matHang || !soTien || !maSo) return alert("Vui lòng nhập đầy đủ thông tin!");

    danhSach.push({ngay, matHang, soTien, maSo});
    luuDuLieu();
    document.getElementById('matHang').value = '';
    document.getElementById('soTien').value = '';
    document.getElementById('maSo').value = '';
  }

  // Hàm xóa với xác nhận Có/Không
  function xoaDong(index) {
    const item = danhSach[index];
    const xacNhan = confirm("Bạn có chắc chắn muốn xóa mặt hàng '" + item.matHang + "' không?");
    if (xacNhan) {
      danhSach.splice(index, 1);
      luuDuLieu();
    }
  }

  function luuDuLieu() {
    database.ref('muasam').set(danhSach).then(hienThiBang);
  }

  function loadDataFromFirebase() {
    database.ref('muasam').once('value', snapshot => {
      danhSach = snapshot.val() || [];
      hienThiBang();
    });
  }

  function restoreDuLieu(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        if(Array.isArray(data)) {
          danhSach = data;
          luuDuLieu();
          alert("Khôi phục dữ liệu thành công!");
        }
      } catch(err) { alert("File không hợp lệ!"); }
    };
    reader.readAsText(file);
  }

  function hienThiBang() {
    const container = document.getElementById('danhSachBang');
    let html = `<table><tr><th>Ngày</th><th>Mặt hàng</th><th>Số tiền</th><th>Mã số</th><th>Thao tác</th></tr>`;
    
    const tongTheoMa = {};
    danhSach.forEach((item, index) => {
      html += `<tr>
                <td>${item.ngay}</td>
                <td>${item.matHang}</td>
                <td>${item.soTien.toLocaleString()} đ</td>
                <td>${item.maSo}</td>
                <td><button class="btn-xoa" onclick="xoaDong(${index})">Xóa</button></td>
              </tr>`;
      tongTheoMa[item.maSo] = (tongTheoMa[item.maSo] || 0) + item.soTien;
    });
    html += `</table>`;

    html += `<h3>Tổng tiền theo mã số:</h3>`;
    for(let ma in tongTheoMa) {
      html += `<p class="tong-ma">Tổng tiền mã ${ma} là: ${tongTheoMa[ma].toLocaleString()} đ</p>`;
    }
    container.innerHTML = html;
  }

  function xuatDuLieu() {
    const blob = new Blob([JSON.stringify(danhSach, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "mua_sam.json";
    a.click();
  }
</script>
</body>
</html>
