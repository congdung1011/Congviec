<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>uốn cô chu pha</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    font-size: 18px;
    background-color: #ccf5ff;
  }
  input, button, select {
    margin: 4px 0;
    padding: 6px 12px;
    font-size: 30px;
  }
  input[type="file"] {
    font-size: 25px;
  }
  input {
    width: 800px;
    font-size: 50px;
    padding: 15px 35px;
    margin: 3px 0;
    background-color: #FFFFE0;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    font-size: 25px;
  }
  th, td {
    border: 2px solid purple;
    padding: 8px;
    text-align: center;
    font-size: 25px;
  }
  th {
    background-color:#FFA500 ;
    color:#0033AA ;
  }
  td:nth-child(2) {
    color: red;
    font-weight: bold;
    background-color: #ccffcc;
  }
  td:nth-child(7) {
    color: red;
    background-color: #ccffcc;
    font-weight: bold;
  }
  .section {
    margin-bottom: 10px;
  }
  .btn {
    padding: 6px 12px;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
  }
  .delete-btn { background-color: red; }
  .edit-btn { background-color: orange; }
  .export-btn { background-color: green; }
  .import-btn { background-color: blue; }

input#searchInput, input#title, input#radius, input#speed, input#hydraulic, input#thickness, input#preheat, input#electric, input#material, input#note {
  background: linear-gradient(120deg, #d4f1f9 25%, #ffffff 50%, #d4f1f9 75%);
  background-size: 1000px 100%;
  animation: shimmer 5s linear infinite;
  border: 2px solid #FF7F7F ;
  border-radius: 10px;
  box-shadow: 0 0 10px #a0eaff;
}

@keyframes shimmer {
  0% { background-position: -1000px 0; }
  100% { background-position: 1000px 0; }
}

@keyframes pulseRed {
  0% { box-shadow: 0 0 5px red; }
  50% { box-shadow: 0 0 20px #E0FFFF ; }
  100% { box-shadow: 0 0 5px red; }
}

#dataTable td:nth-child(2), #dataTable td:nth-child(7) {
  background: linear-gradient(120deg, #e3f2fd 25%, #e8f5e9 50%, #e3f2fd 75%);
  background-size: 1000px 100%;
  animation: shimmer 4s linear infinite, pulseRed 5s ease-in-out infinite;
  border-radius: 6px;
}
.title-cochupha {
  color: red;
  font-size: 50px;
  text-shadow: 2px 2px 5px gray;
}
</style>

<script>
  // CẤU HÌNH KẾT NỐI CHUẨN XÁC CỦA ANH
  const firebaseConfig = {
    apiKey: "AIzaSyC9mGXrWmaSAFfDGFbCrefl2ilx_7BFtvA",
    authDomain: "du-lieu-uon.firebaseapp.com",
    databaseURL: "https://du-lieu-uon-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "du-lieu-uon",
    storageBucket: "du-lieu-uon.firebasestorage.app",
    messagingSenderId: "783896796114",
    appId: "1:783896796114:web:050878959c3eac9909860b"
  };
  
  // Khởi tạo hệ thống
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // Đăng nhập bằng Email và Mật khẩu tự gõ (Đã sửa lỗi đứng màn hình)
  function loginWithEmail() {
    const email = document.getElementById("txtEmail").value.trim();
    const password = document.getElementById("txtPassword").value.trim();

    if(!email || !password) {
      document.getElementById("errorMessage").innerText = "Vui lòng nhập đầy đủ tài khoản và mật khẩu!";
      return;
    }

    document.getElementById("errorMessage").innerText = "Đang xử lý đăng nhập...";

    // Ép Firebase chỉ lưu thông tin trong phiên (Tắt tab/trình duyệt là tự đăng xuất)
    firebase.auth().setPersistence(firebase.auth().Auth.Persistence.SESSION)
      .then(() => {
        return firebase.auth().signInWithEmailAndPassword(email, password);
      })
      .then((userCredential) => {
        // ĐĂNG NHẬP THÀNH CÔNG: Chuyển giao diện trực tiếp không cần F5 trang
        const user = userCredential.user;
        if (user && user.email === "dungpc1011@gmail.com") {
          document.getElementById("loginContainer").style.display = "none";
          document.getElementById("mainContent").style.display = "block";
          document.getElementById("userEmail").innerText = "Tài khoản: " + user.email;
          document.getElementById("errorMessage").innerText = "";
          
          renderTable();
          loadDataFromFirebase();
        } else {
          document.getElementById("errorMessage").innerText = "Tài khoản không có quyền truy cập!";
          firebase.auth().signOut();
        }
      })
      .catch((error) => {
        console.error(error);
        document.getElementById("errorMessage").innerText = "Sai tài khoản hoặc mật khẩu!";
      });
  }

  // Đăng xuất bằng tay
  function logout() {
    firebase.auth().signOut().then(() => {
      location.reload();
    });
  }

  // Quản lý kiểm tra trạng thái khi tải trang
  window.onload = function () {
    firebase.auth().onAuthStateChanged((user) => {
      if (user && user.email === "dungpc1011@gmail.com") {
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        document.getElementById("userEmail").innerText = "Tài khoản: " + user.email;
        
        renderTable();
        loadDataFromFirebase();
      } else {
        document.getElementById("loginContainer").style.display = "block";
        document.getElementById("mainContent").style.display = "none";
      }
    });
  };
</script>
</head>

<body>
  <div id="loginContainer" style="text-align: center; margin-top: 80px; display: none;">
    <h2 class="title-cochupha">CÔ CHU PHA</h2>
    <h2>ĐĂNG NHẬP HỆ THỐNG</h2>
    <br>
    <input type="email" id="txtEmail" placeholder="Nhập Email" style="width: 400px; font-size: 24px; padding: 10px;"><br>
    <input type="password" id="txtPassword" placeholder="Nhập Mật khẩu" style="width: 400px; font-size: 24px; padding: 10px;"><br><br>
    <button onclick="loginWithEmail()" style="font-size: 24px; padding: 12px 40px; background-color: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
      Vào hệ thống
    </button>
    <p id="errorMessage" style="color: red; font-size: 20px; margin-top: 20px;"></p>
  </div>

  <div id="mainContent" style="display: none;">
    <div style="text-align: right; margin-bottom: 20px;">
      <span id="userEmail" style="font-weight: bold; font-size: 20px; color: green;"></span>
      <button onclick="logout()" style="font-size: 18px; margin-left: 15px; background-color: #ff4d4d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px;">Đăng xuất</button>
    </div>

    <h2>Thông số uốn cô chu pha</h2>

    <div class="section">
      <input id="searchInput" type="text" placeholder="Tìm kiếm tiêu đề..." oninput="searchData()">
      <button class="btn" style="background-color: #008CBA;" onclick="searchData()">Tìm kiếm</button>
    </div>

    <div class="section">
      <input id="title" type="text" placeholder="Tiêu đề">
      <input id="radius" type="text" placeholder="Bán kính">
      <input id="speed" type="text" placeholder="Tốc độ">
      <input id="hydraulic" type="text" placeholder="Thủy lực">
      <input id="thickness" type="text" placeholder="Dày">
      <input id="preheat" type="text" placeholder="Preheat">
      <input id="electric" type="text" placeholder="Điện">
      <input id="material" type="text" placeholder="Chất liệu">
      <input id="note" type="text" placeholder="Ghi chú">
      <button id="saveButton" style="font-size: 30px; background-color: #4CAF50; color: white;" onclick="saveData()">Lưu</button>
      <button class="btn export-btn" onclick="exportJSON()">Xuất JSON</button>
      <input type="file" id="importFile" accept=".json" onchange="importJSON()" />
    </div>

    <table id="dataTable">
      <thead>
        <tr>
          <th>Tiêu đề</th>
          <th>Bán kính</th>
          <th>Tốc độ</th>
          <th>Thủy lực</th>
          <th>Dày</th>
          <th>Preheat</th>
          <th>Điện</th>
          <th>Chất liệu</th>
          <th>Ghi chú</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
    let editingId = null;

    const getInputData = () => ({
      id: editingId || Date.now(),
      title: document.getElementById("title").value.trim(),
      radius: document.getElementById("radius").value.trim() || '',  
      speed: document.getElementById("speed").value.trim() || '',  
      hydraulic: document.getElementById("hydraulic").value.trim() || '',  
      thickness: document.getElementById("thickness").value.trim() || '',  
      preheat: document.getElementById("preheat").value.trim() || '',  
      electric: document.getElementById("electric").value.trim() || '',  
      material: document.getElementById("material").value.trim() || '',  
      note: document.getElementById("note").value.trim() || ''  
    });

    const saveData = () => {
      const data = getInputData();
      if (!data.title) {
        alert("Vui lòng điền Tiêu đề.");
        return;
      }

      let savedData = JSON.parse(localStorage.getItem("dataItems_cochupha") || "[]");
      if (editingId) {
        const index = savedData.findIndex(item => item.id === editingId);
        if(index !== -1) savedData[index] = data;
      } else {
        savedData.push(data);
      }
      localStorage.setItem("dataItems_cochupha", JSON.stringify(savedData));
      
      database.ref('thongso').set(savedData)
        .then(() => { console.log("Đã đồng bộ lên đám mây Firebase!"); })
        .catch(error => { console.error("Lỗi đồng bộ đám mây:", error); });

      editingId = null;  
      renderTable();
      clearForm();
    };

    const renderTable = () => {
      const data = JSON.parse(localStorage.getItem("dataItems_cochupha") || "[]");
      const tbody = document.getElementById("dataTable").getElementsByTagName("tbody")[0];
      tbody.innerHTML = "";  

      data.forEach(item => {
        const row = tbody.insertRow();
        row.innerHTML = `
          <td>${item.title}</td>
          <td class="sparkle">${item.radius}</td>
          <td>${item.speed}</td>
          <td>${item.hydraulic}</td>
          <td>${item.thickness}</td>
          <td>${item.preheat}</td>
          <td class="sparkle">${item.electric}</td>
          <td>${item.material}</td>
          <td>${item.note}</td>
          <td>
            <button class="btn edit-btn" onclick="editData(${item.id})">Sửa</button>
            <button class="btn delete-btn" onclick="deleteData(${item.id})">Xóa</button>
          </td>
        `;
      });
    };

    const loadDataFromFirebase = () => {
      database.ref('thongso').once('value')
        .then(snapshot => {
          const cloudData = snapshot.val();
          if (cloudData) {
            localStorage.setItem("dataItems_cochupha", JSON.stringify(cloudData));
            renderTable();
          }
        })
        .catch(error => {
          console.error("Lỗi tải từ đám mây, sử dụng bộ nhớ máy:", error);
        });
    };

    const editData = (id) => {
      const savedData = JSON.parse(localStorage.getItem("dataItems_cochupha"));
      const item = savedData.find(data => data.id === id);
      document.getElementById("title").value = item.title;
      document.getElementById("radius").value = item.radius;
      document.getElementById("speed").value = item.speed;
      document.getElementById("hydraulic").value = item.hydraulic;
      document.getElementById("thickness").value = item.thickness;
      document.getElementById("preheat").value = item.preheat;
      document.getElementById("electric").value = item.electric;
      document.getElementById("material").value = item.material;
      document.getElementById("note").value = item.note;
      editingId = id;  
    };

    const deleteData = (id) => {
      const confirmDelete = confirm("Bạn có chắc chắn muốn xóa mục này không?");
      if (!confirmDelete) return;

      let savedData = JSON.parse(localStorage.getItem("dataItems_cochupha"));
      savedData = savedData.filter(item => item.id !== id);
      localStorage.setItem("dataItems_cochupha", JSON.stringify(savedData));

      database.ref('thongso').set(savedData);
      renderTable();
    };

    const searchData = () => {
      const searchText = document.getElementById("searchInput").value.toLowerCase();
      const savedData = JSON.parse(localStorage.getItem("dataItems_cochupha") || "[]");
      const filteredData = savedData.filter(item => item.title.toLowerCase().includes(searchText));
      renderSearchResults(filteredData);
    };

    const renderSearchResults = (data) => {
      const tbody = document.getElementById("dataTable").getElementsByTagName("tbody")[0];
      tbody.innerHTML = "";  

      data.forEach(item => {
        const row = tbody.insertRow();
        row.innerHTML = `
          <td>${item.title}</td>
          <td class="sparkle">${item.radius}</td>
          <td>${item.speed}</td>
          <td>${item.hydraulic}</td>
          <td>${item.thickness}</td>
          <td>${item.preheat}</td>
          <td class="sparkle">${item.electric}</td>
          <td>${item.material}</td>
          <td>${item.note}</td>
          <td>
            <button class="btn edit-btn" onclick="editData(${item.id})">Sửa</button>
            <button class="btn delete-btn" onclick="deleteData(${item.id})">Xóa</button>
          </td>
        `;
      });
    };

    const exportJSON = () => {
      const data = localStorage.getItem("dataItems_cochupha");
      if (!data) {
        alert("Không có dữ liệu để xuất.");
        return;
      }
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "cochupha.json";
      a.click();
      URL.revokeObjectURL(url);
    };

    const importJSON = () => {
      const file = document.getElementById("importFile").files[0];
      const reader = new FileReader();
      reader.onload = function(event) {
        const importedData = JSON.parse(event.target.result);
        localStorage.setItem("dataItems_cochupha", JSON.stringify(importedData));
        database.ref('thongso').set(importedData);
        renderTable();
      };
      reader.readAsText(file);
    };

    const clearForm = () => {
      document.getElementById("title").value = '';
      document.getElementById("radius").value = '';
      document.getElementById("speed").value = '';
      document.getElementById("hydraulic").value = '';
      document.getElementById("thickness").value = '';
      document.getElementById("preheat").value = '';
      document.getElementById("electric").value = '';
      document.getElementById("material").value = '';
      document.getElementById("note").value = '';
    };
    </script>
  </div>
</body>
</html>
