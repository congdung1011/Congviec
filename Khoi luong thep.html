  <title>Tra Khối Lượng Thép H</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 30px;
      padding: 40px;
      background-color: #f4f4f4;
    }
    input, button {
      font-size: 40px;
      padding: 5px 30px;
      margin: 5px 0;
    }
    button {
      cursor: pointer;
    }
    #result {
      margin-top: 30px;

    }

<body>
  <h2>Tra khối lượng thép hình H</h2>

  <label for="height">Chiều cao h(높이) (mm):</label><br>
  <input type="number" id="height"><br><br>

  <label for="length">Chiều dài(길이) (m):</label><br>
  <input type="number" id="length" step="0.01"><br><br>

  <button onclick="traKhoiLuong()">Tra cứu(계산)</button>

    function traKhoiLuong() {
      const b = document.getElementById('width').value;
      const h = document.getElementById('height').value;
      const l = document.getElementById('length').value;

      const key1 = `${h}x${b}`;
      const key2 = `${b}x${h}`;
      const weightPerMeter = data[key1] || data[key2];

      if (weightPerMeter) {
        const total = (weightPerMeter * l).toFixed(2);
        document.getElementById('result').innerText = 
          `Khối lượng 1m(1미터당 무게): ${weightPerMeter} kg\nTổng khối lượng(총무게): ${total} kg`;
      } else {
        document.getElementById('result').innerText = 'Không tìm thấy thép H có kích thước này.';
      }
    }
  </script>
