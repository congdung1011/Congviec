<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hệ thống tổng hợp – Phan Công Dũng</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#eef;
}
.menu{
  position:sticky;
  top:0;
  z-index:9999;
  background:#003366;
  padding:12px;
  display:flex;
  gap:12px;
  justify-content:center;
}
.menu button{
  font-size:20px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#ffcc00;
  font-weight:bold;
}
.menu button:hover{background:#ff9900}
iframe{
  width:100%;
  height:calc(100vh - 80px);
  border:none;
  display:none;
  background:white;
}
</style>

<script>
function showFrame(id){
  document.querySelectorAll("iframe").forEach(f=>f.style.display="none");
  document.getElementById(id).style.display="block";
}
</script>
</head>

<body>

<div class="menu">
  <button onclick="showFrame('f1')">Uốn Cô Chu Pha</button>
  <button onclick="showFrame('f2')">Ghi Giờ Tăng Ca</button>
  <button onclick="showFrame('f3')">Tính Bán Kính</button>
</div>

<iframe id="f1" src="Uon cochupha.html"></iframe>
<iframe id="f2" src="Ghi gio tang ca.html"></iframe>
<iframe id="f3" src="Tinh ban kinh.html"></iframe>

<script>
showFrame('f1');
</script>

</body>
</html>
