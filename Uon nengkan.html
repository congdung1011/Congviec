<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thông số uốn nengkan</title>
  <style>
/* Hiệu ứng lấp lánh mặt hồ cho tất cả input */
input[type="text"], input[type="password"] {
  background: linear-gradient(270deg, #fffcc4, #ccf2f4);
  background-size: 400% 400%;
  animation: shimmer 8s ease infinite;
  border: 2px solid #d1ecf1;
  box-shadow: 0 0 10px rgba(0, 255, 255, 0.25);
  transition: box-shadow 0.3s ease;
}

input[type="text"]:focus, input[type="password"]:focus {
  box-shadow: 0 0 15px rgba(0, 200, 255, 0.5);
}

@keyframes shimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
/* Hiệu ứng lấp lánh mặt hồ cho cột Bán kính và Đẩy trong bảng */
#dataTable td:nth-child(2),
#dataTable td:nth-child(5) {
  background: linear-gradient(270deg, #ccf2f4, #fffcc4);
  background-size: 400% 400%;
  animation: shimmer 8s ease infinite;
  transition: background 0.5s ease;
  box-shadow: inset 0 0 10px rgba(200, 255, 255, 0.2);
}

@keyframes shimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

      body {
    font-family: Arial, sans-serif; /* Font chữ cho toàn bộ trang */
    padding: 20px; /* Khoảng cách nội dung với viền trình duyệt */
    font-size: 18px; /* Kích thước chữ mặc định */
    background-color: #ccf5ff; /* Đặt nền trang thành màu xanh nhạt */
  }
  input, button, select {
    margin: 4px 0; /* Khoảng cách trên/dưới giữa các ô nhập và nút */
    padding: 6px 12px; /* Khoảng cách bên trong nút/ô nhập */
    font-size: 30px; /* Kích thước chữ cho nút và ô nhập */
  }
  input[type="file"] {
    font-size: 25px; /* Kích thước chữ riêng cho ô chọn file */
  }
  input {
    width: 800px; /* Chiều rộng của ô nhập liệu */
    font-size: 50px; /* Kích thước chữ trong ô nhập */
    padding: 15px 35px; /* Khoảng cách bên trong ô nhập */
    margin: 3px 0; /* Khoảng cách trên/dưới mỗi ô nhập */
  background-color: #FFFFE0;
  }
  table {
    width: 100%; /* Bảng chiếm toàn bộ chiều rộng */
    border-collapse: collapse; /* Gộp viền các ô lại với nhau */
    margin-top: 20px; /* Khoảng cách phía trên bảng */

  }
  th, td {
    border: 2px solid purple; /* Viền của các ô bảng màu tím */
    padding: 8px; /* Khoảng cách nội dung với viền ô */
    text-align: center; /* Căn giữa nội dung ô */
    font-size: 25px; /* Kích thước chữ trong ô */
  }
  th {
    background-color:#FFA500 ; /* Nền xám nhạt cho hàng tiêu đề */
color:#0033AA ;
 }
  td:nth-child(2) { /* Áp dụng cho cột thứ 2 - Bán kính */
    color: red; /* Chữ màu xanh dương */
    font-weight: bold;
    background-color: #ccffcc;
  }
  td:nth-child(5) { /* Áp dụng cho cột thứ 5 - Đẩy */
    color: red; /* Chữ màu đỏ */
    background-color: #ccffcc;
    font-weight: bold;
  }
  .section {
    margin-bottom: 10px; /* Khoảng cách giữa các phần */
  }
  .btn {
    padding: 6px 12px; /* Kích thước nút bấm */
    color: white; /* Chữ trên nút màu trắng */
    border: none; /* Bỏ viền nút */
    cursor: pointer; /* Đổi con trỏ chuột khi hover */
    font-size: 16px; /* Kích thước chữ trên nút */
  }
  .delete-btn { background-color: red; } /* Nút xoá có nền đỏ */
  .edit-btn { background-color: orange; } /* Nút sửa có nền cam */
  .export-btn { background-color: green; } /* Nút xuất file có nền xanh lá */
  .import-btn { background-color: blue; } /* Nút nhập file có nền xanh dương */
#passwordInput {
display: block;
  margin: 0 auto;      /* Căn giữa ngang */
  width: 400px;   /* ví dụ chiều rộng */
height: 120px;   /* Chiều cao */
  font-size: 40px;
  padding: 10px 20px;
}
.title-nengkan {
  color: red;
  font-size: 50px;
  text-shadow: 2px 2px 5px gray;
}
  </style>

  <script>
    function checkPassword() {
      const password = document.getElementById("passwordInput").value;
      if (password === "qqqq") {
        document.getElementById("passwordContainer").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        renderTable();
      } else {
        document.getElementById("errorMessage").innerText = "Sai mật khẩu! Vui lòng thử lại.";
      }
    }
  </script>
</head>
<body>
  <div id="passwordContainer" style="text-align: center; margin-top: 100px;">
<h2 class="title-nengkan">NENGKAN</h2>
    <h2>Vui lòng nhập mật khẩu để truy cập:</h2>
 <input type="password" 

id="passwordInput" />

    <button onclick="checkPassword()">Xác nhận</button>
    <p id="errorMessage" style="color: red;"></p>
  </div>

  <div id="mainContent" style="display: none;">
    <h2>Thông số uốn nengkan</h2>

    <div class="section">
      <input id="searchInput" type="text" placeholder="Tìm kiếm tiêu đề..." oninput="searchData()">
      <button class="btn" onclick="searchData()">Tìm kiếm</button>
    </div>

    <div class="section">
      <input id="title" type="text" placeholder="Tiêu đề">
      <input id="radius" type="text" placeholder="Bán kính">
      <input id="hydraulic" type="text" placeholder="Thủy lực giữa">
      <input id="thickness" type="text" placeholder="Dày">
      <input id="electric" type="text" placeholder="Đẩy">
      <input id="material" type="text" placeholder="Chất liệu">
      <input id="note" type="text" placeholder="Ghi chú">
      <button id="saveButton" onclick="saveData()">Lưu</button>
      <button class="btn export-btn" onclick="exportJSON()">Xuất JSON</button>
      <button class="btn delete-btn" onclick="deleteAllData()">Xóa tất cả</button>
      <input type="file" id="importFile" accept=".json" onchange="importJSON()" />
    </div>

    <table id="dataTable">
      <thead>
        <tr>
          <th>Tiêu đề</th>
          <th>Bán kính</th>
          <th>Thủy lực giữa</th>
          <th>Dày</th>
          <th>Đẩy</th>
          <th>Chất liệu</th>
          <th>Ghi chú</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      let editingId = null;

      const getInputData = () => ({
        id: editingId || Date.now(),
        title: document.getElementById("title").value.trim(),
        radius: document.getElementById("radius").value.trim(),
        hydraulic: document.getElementById("hydraulic").value.trim(),
        thickness: document.getElementById("thickness").value.trim(),
        electric: document.getElementById("electric").value.trim(),
        material: document.getElementById("material").value.trim(),
        note: document.getElementById("note").value.trim()
      });

      const saveData = () => {
        const data = getInputData();
        if (!data.title) {
          alert("Vui lòng điền Tiêu đề.");
          return;
        }

        let savedData = JSON.parse(localStorage.getItem("dataItems_nengkan") || "[]");
        if (editingId) {
          const index = savedData.findIndex(item => item.id === editingId);
          savedData[index] = data;
        } else {
          savedData.push(data);
        }
        localStorage.setItem("dataItems_nengkan", JSON.stringify(savedData));
        editingId = null;
        renderTable();
        clearForm();
      };

      const renderTable = () => {
        const data = JSON.parse(localStorage.getItem("dataItems_nengkan") || "[]");
        const tbody = document.getElementById("dataTable").getElementsByTagName("tbody")[0];
        tbody.innerHTML = "";
        data.forEach(item => {
          const row = tbody.insertRow();
          row.innerHTML = `
            <td>${item.title}</td>
            <td>${item.radius}</td>
            <td>${item.hydraulic}</td>
            <td>${item.thickness}</td>
            <td>${item.electric}</td>
            <td>${item.material}</td>
            <td>${item.note}</td>
            <td>
              <button class="btn edit-btn" onclick="editData(${item.id})">Sửa</button>
              <button class="btn delete-btn" onclick="deleteData(${item.id})">Xóa</button>
            </td>
          `;
        });
      };

      const editData = (id) => {
        const savedData = JSON.parse(localStorage.getItem("dataItems_nengkan"));
        const item = savedData.find(data => data.id === id);
        document.getElementById("title").value = item.title;
        document.getElementById("radius").value = item.radius;
        document.getElementById("hydraulic").value = item.hydraulic;
        document.getElementById("thickness").value = item.thickness;
        document.getElementById("electric").value = item.electric;
        document.getElementById("material").value = item.material;
        document.getElementById("note").value = item.note;
        editingId = id;
      };

      const deleteData = (id) => {
        const confirmDelete = confirm("Bạn có chắc chắn muốn xóa mục này không?");
        if (!confirmDelete) return;
        let savedData = JSON.parse(localStorage.getItem("dataItems_nengkan"));
        savedData = savedData.filter(item => item.id !== id);
        localStorage.setItem("dataItems_nengkan", JSON.stringify(savedData));
        renderTable();
      };

      const deleteAllData = () => {
        const confirmDelete = confirm("Bạn có chắc chắn muốn xóa tất cả dữ liệu không?");
        if (!confirmDelete) return;
        localStorage.removeItem("dataItems_nengkan");
        renderTable();
        alert("Tất cả dữ liệu đã được xóa.");
      };

      const searchData = () => {
        const searchText = document.getElementById("searchInput").value.toLowerCase();
        const savedData = JSON.parse(localStorage.getItem("dataItems_nengkan") || "[]");
        const filteredData = savedData.filter(item => item.title.toLowerCase().includes(searchText));
        renderSearchResults(filteredData);
      };

      const renderSearchResults = (data) => {
        const tbody = document.getElementById("dataTable").getElementsByTagName("tbody")[0];
        tbody.innerHTML = "";
        data.forEach(item => {
          const row = tbody.insertRow();
          row.innerHTML = `
            <td>${item.title}</td>
            <td>${item.radius}</td>
            <td>${item.hydraulic}</td>
            <td>${item.thickness}</td>
            <td>${item.electric}</td>
            <td>${item.material}</td>
            <td>${item.note}</td>
            <td>
              <button class="btn edit-btn" onclick="editData(${item.id})">Sửa</button>
              <button class="btn delete-btn" onclick="deleteData(${item.id})">Xóa</button>
            </td>
          `;
        });
      };

      const exportJSON = () => {
        const data = localStorage.getItem("dataItems_nengkan");
        if (!data) {
          alert("Không có dữ liệu để xuất.");
          return;
        }
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "nengkan.json";
        a.click();
        URL.revokeObjectURL(url);
      };

      const importJSON = () => {
        const file = document.getElementById("importFile").files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
          const importedData = JSON.parse(event.target.result);
          localStorage.setItem("dataItems_nengkan", JSON.stringify(importedData));
          renderTable();
        };
        reader.readAsText(file);
      };

      const clearForm = () => {
        document.getElementById("title").value = '';
        document.getElementById("radius").value = '';
        document.getElementById("hydraulic").value = '';
        document.getElementById("thickness").value = '';
        document.getElementById("electric").value = '';
        document.getElementById("material").value = '';
        document.getElementById("note").value = '';
      };
    </script>
  </div>
</body>
</html>
