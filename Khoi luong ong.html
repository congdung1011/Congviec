
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tính khối lượng ống sắt</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #f0f8ff, #e6f7ff);
      padding: 40px;
      font-size: 40px;
    }
    .container {
      max-width: 100%;
      margin: auto;
      background-color: #ffffff;
      border-radius: 40px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 40px;
    }
    h2 {
      text-align: center;
      color: #0077cc;
      font-size: 40px;
    }
    label {
      font-weight: bold;
      margin-top: 40px;
      display: block;
    }
    input, select {
      width: 90%;
      padding: 40px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 40px;
    }
    .result {
      margin-top: 40px;
      font-size: 40px;
      color: green;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Tính khối lượng ống sắt</h2>

    <label>Chiều dài(길이):</label>
    <input type="number" id="chieuDai" placeholder="Nhập chiều dài" oninput="tinhKhoiLuong()">
    <select id="donViChieuDai" onchange="tinhKhoiLuong()">
      <option value="1">mm</option>
      <option value="10">cm</option>
      <option value="1000">m</option>
    </select>

    <label>Đường kính ngoài(파이프 외경):</label>
    <input type="number" id="duongKinh" placeholder="Nhập đường kính" oninput="tinhKhoiLuong()">
    <select id="donViDuongKinh" onchange="tinhKhoiLuong()">
      <option value="1">mm</option>
      <option value="10">cm</option>
      <option value="1000">m</option>
    </select>

    <label>Độ dày thành ống(파이프 두께) (mm):</label>
    <input type="number" id="doDay" placeholder="Nhập độ dày" oninput="tinhKhoiLuong()">

    <div class="result" id="ketQua">Vui lòng nhập đầy đủ thông tin.</div>
  </div>

  <script>
    function tinhKhoiLuong() {
      const cd = parseFloat(document.getElementById("chieuDai").value);
      const d = parseFloat(document.getElementById("duongKinh").value);
      const t = parseFloat(document.getElementById("doDay").value);

      const donViCD = parseFloat(document.getElementById("donViChieuDai").value);
      const donViDK = parseFloat(document.getElementById("donViDuongKinh").value);

      if (isNaN(cd) || isNaN(d) || isNaN(t)) {
        document.getElementById("ketQua").innerText = "Vui lòng nhập đầy đủ thông tin.";
        return;
      }

      const chieuDaiMM = cd * donViCD;
      const duongKinhMM = d * donViDK;

      const rNgoai = duongKinhMM / 2;
      const rTrong = rNgoai - t;

      if (rTrong <= 0) {
        document.getElementById("ketQua").innerText = "Độ dày quá lớn, ống không hợp lệ.";
        return;
      }
      const theTich = Math.PI * (Math.pow(rNgoai, 2) - Math.pow(rTrong, 2)) * chieuDaiMM;
      const khoiLuong = theTich * 7.85 / 1000000;

      document.getElementById("ketQua").innerText = `Khối lượng ước tính(예상 무게): ${khoiLuong.toFixed(2)} kg`;
    }
  </script>
</body>
</html>
