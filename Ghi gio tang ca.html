<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Ghi Giờ Tăng Ca</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <style id="theme-style">
    /* Giao diện mặc định sẽ được nạp bằng JS bên dưới */
  </style>

<script>
  // Định nghĩa 2 bộ CSS
  const theme1 = `
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; padding: 20px; background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 50%, #e0f7fa 100%); min-height: 100vh; color: #444; }
    input, button { margin: 5px 0; padding: 15px; border-radius: 12px; border: none; font-size: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input[type="date"] { background-color: #fff9c4; color: #d32f2f; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 22px; background: white; border-radius: 15px; overflow: hidden; border: 2px solid #795548; }
    th, td { border: 2px solid #795548; padding: 15px; text-align: center; }
    th { background: linear-gradient(145deg, #d1c4e9, #b39ddb); color: white; border-bottom: 2px solid #795548; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); box-shadow: inset 1px 1px 2px rgba(255,255,255,0.5); }
    button { cursor: pointer; font-weight: bold; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 5px 0 #999, 0 8px 10px rgba(0,0,0,0.2); }
    button:active { transform: translateY(4px); box-shadow: 0 1px 0 #999, 0 2px 5px rgba(0,0,0,0.2); }
    tr:hover { background-color: #f3e5f5; }
    .btn-xoa { color: #ff5252; cursor: pointer; font-weight: bold; margin-right: 10px; text-shadow: 0 1px 1px rgba(255,255,255,0.8); }
    .btn-sua { color: #448aff; cursor: pointer; font-weight: bold; text-shadow: 0 1px 1px rgba(255,255,255,0.8); }
    .thang-title { color: #fff; background: linear-gradient(to right, #4facfe, #00f2fe); font-weight: bold; font-size: 24px; padding: 15px; margin-top: 30px; border-radius: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .tong-gio { color: #d81b60; font-weight: bold; margin: 10px 0; background: rgba(255,255,255,0.7); padding: 10px; border-radius: 8px; }
    .title-tangca { color: #ffffff; font-size: 50px; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); letter-spacing: 2px; }
    .search-box { margin-top: 20px; padding: 15px; background: rgba(255, 255, 255, 0.4); border-radius: 15px; }
    .tong-nam-container { margin: 15px 0; font-weight: bold; color: #5d4037; background: #fffde7; padding: 15px; border-radius: 15px; border: 2px dashed #ffd54f; }
  `;

  const theme2 = `
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 20px; padding: 20px; background: linear-gradient(135deg, #d4af37 0%, #f3e5ab 50%, #d4af37 100%); min-height: 100vh; color: #444; }
    input, button { margin: 5px 0; padding: 15px; border-radius: 12px; border: none; font-size: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input[type="date"] { background-color: #fff9c4; color: #d32f2f; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 22px; background: white; border-radius: 15px; overflow: hidden; border: 2px solid #8b4513; }
    th, td { border: 2px solid #8b4513; padding: 15px; text-align: center; }
    th { background: linear-gradient(145deg, #a0522d, #d2691e); color: white; border-bottom: 2px solid #8b4513; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); box-shadow: inset 1px 1px 2px rgba(255,255,255,0.5); }
    button { cursor: pointer; font-weight: bold; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 5px 0 #999, 0 8px 10px rgba(0,0,0,0.2); }
    button:active { transform: translateY(4px); box-shadow: 0 1px 0 #999, 0 2px 5px rgba(0,0,0,0.2); }
    tr:hover { background-color: #fff3e0; }
    .btn-xoa { color: #d32f2f; cursor: pointer; font-weight: bold; margin-right: 10px; text-shadow: 0 1px 1px rgba(255,255,255,0.8); }
    .btn-sua { color: #1976d2; cursor: pointer; font-weight: bold; text-shadow: 0 1px 1px rgba(255,255,255,0.8); }
    .thang-title { color: #fff; background: linear-gradient(to right, #a0522d, #d2691e); font-weight: bold; font-size: 24px; padding: 15px; margin-top: 30px; border-radius: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .tong-gio { color: #5d4037; font-weight: bold; margin: 10px 0; background: rgba(255,255,255,0.7); padding: 10px; border-radius: 8px; }
    .title-tangca { color: #5d4037; font-size: 50px; text-shadow: 2px 2px 4px rgba(255,255,255,0.5); letter-spacing: 2px; }
    .search-box { margin-top: 20px; padding: 15px; background: rgba(255, 255, 255, 0.4); border-radius: 15px; }
    .tong-nam-container { margin: 15px 0; font-weight: bold; color: #5d4037; background: #fffde7; padding: 15px; border-radius: 15px; border: 2px dashed #d4af37; }
  `;

  function apDungGiaoDien() {
    const theme = localStorage.getItem('theme') || '1';
    document.getElementById('theme-style').innerHTML = (theme === '1') ? theme1 : theme2;
  }

  function doiGiaoDien() {
    const current = localStorage.getItem('theme') || '1';
    localStorage.setItem('theme', current === '1' ? '2' : '1');
    apDungGiaoDien();
  }

  apDungGiaoDien();

  const firebaseConfig = {
    apiKey: "AIzaSyC9mGXrWmaSAFfDGFbCrefl2ilx_7BFtvA",
    authDomain: "du-lieu-uon.firebaseapp.com",
    databaseURL: "https://du-lieu-uon-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "du-lieu-uon",
    storageBucket: "du-lieu-uon.firebasestorage.app",
    messagingSenderId: "783896796114",
    appId: "1:783896796114:web:050878959c3eac9909860b"
  };
  
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  function loginWithEmail() {
    const email = document.getElementById("txtEmail").value.trim();
    const password = document.getElementById("txtPassword").value.trim();
    if(!email || !password) { document.getElementById("errorMessage").innerText = "Vui lòng nhập đầy đủ tài khoản và mật khẩu!"; return; }
    firebase.auth().setPersistence('session')
      .then(() => firebase.auth().signInWithEmailAndPassword(email, password))
      .then((userCredential) => {
        if (userCredential.user.email === "dungpc1011@gmail.com") {
          location.reload();
        } else {
          document.getElementById("errorMessage").innerText = "Tài khoản không có quyền truy cập!";
          firebase.auth().signOut();
        }
      })
      .catch(() => document.getElementById("errorMessage").innerText = "Sai tài khoản hoặc mật khẩu!");
  }

  function logout() { firebase.auth().signOut().then(() => location.reload()); }

  window.onload = function () {
    firebase.auth().onAuthStateChanged((user) => {
      if (user && user.email === "dungpc1011@gmail.com") {
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("noiDung").style.display = "block";
        document.getElementById("userEmail").innerText = "Tài khoản: " + user.email;
        loadDataFromFirebase();
      } else {
        document.getElementById("loginContainer").style.display = "block";
      }
    });
  };
</script>
</head>
<body>

  <div id="loginContainer" style="text-align: center; margin-top: 80px; display: none;">
    <h2 class="title-tangca">GHI GIỜ TĂNG CA</h2>
    <h2 style="color: white;">ĐĂNG NHẬP HỆ THỐNG</h2>
    <input type="email" id="txtEmail" placeholder="Nhập Email" style="width: 80%; font-size: 40px; padding: 10px;"><br>
    <input type="password" id="txtPassword" placeholder="Nhập Mật khẩu" style="width: 80%; font-size: 40px; padding: 10px;"><br><br>
    <button onclick="loginWithEmail()" style="font-size: 24px; padding: 12px 40px; background-color: #ff4081; color: white; border: none; border-radius: 8px; cursor: pointer; width: auto;">Vào hệ thống</button>
    <p id="errorMessage" style="color: yellow; font-weight: bold;"></p>
  </div>

<div id="noiDung" style="display: none;">
  <div style="text-align: right; margin-bottom: 20px;">
    <button onclick="doiGiaoDien()" style="font-size: 16px; margin-right: 15px; background-color: #ff9800; color: white; padding: 5px 10px; cursor: pointer; border: none;">Đổi giao diện</button>
    <span id="userEmail" style="font-weight: bold; color: #4a148c;"></span>
    <button onclick="logout()" style="font-size: 18px; margin-left: 15px; background-color: #ff5252; color: white; padding: 5px 10px; cursor: pointer; border: none;">Đăng xuất</button>
  </div>

  <h2 style="color: #4a148c;">Ghi Giờ Tăng Ca</h2>
  
  <div style="display: flex; gap: 10px; align-items: center;">
    <input type="date" id="ngay" style="width: 450px; height: 100px; box-sizing: border-box; padding: 5px;"/>
    <input type="number" id="gio" placeholder="Số giờ" step="0.1" style="width: 250px; height: 100px; box-sizing: border-box; padding: 5px;"/>
    <button onclick="themGio()" style="width: 250px; height: 100px; background-color: #6a1b9a; color: white; cursor: pointer; font-size: 18px; padding: 0; margin:0;">Ghi lại</button>
  </div>

  <div style="display: flex; gap: 10px; align-items: center; margin-top: 10px;">
    <input type="text" id="txtTimKiem" placeholder="Tìm kiếm..." style="width: 420px; height: 100px; box-sizing: border-box; padding: 5px;" oninput="hienThiBang()">
    <button onclick="xuatDuLieu()" style="width: 250px; height: 100px; background-color: #00c853; color: white; cursor: pointer; font-size: 18px; padding: 0; margin:0;">Xuất JSON</button>
    <button type="button" style="width: 250px; height: 100px; background-color: #2196f3; color: white; font-size: 18px; border: none; cursor: pointer; border-radius: 12px; padding: 0; margin:0;" onclick="document.getElementById('taiFile').click()">Chọn tệp</button>
  </div>

  <input type="file" id="taiFile" accept=".json" onchange="taiDuLieuTuFile()" style="display: none;">

  <div id="tongNamContainer" class="tong-nam-container"></div>

  <hr>
  <div id="danhSachBang"></div>

  <script>
    let danhSach = [];
// Tạo ngày mới và điều chỉnh theo múi giờ địa phương (Gwangju, UTC+9)
const now = new Date();
const localDate = new Date(now.getTime() - (now.getTimezoneOffset() * 60000));
document.getElementById('ngay').value = localDate.toISOString().split('T')[0];

    function luuDuLieu() {
      localStorage.setItem('tangCa', JSON.stringify(danhSach));
      database.ref('tangca').set(danhSach);
    }

    function loadDataFromFirebase() {
      database.ref('tangca').once('value').then(snapshot => {
        const cloudData = snapshot.val();
        if (cloudData) { danhSach = cloudData; localStorage.setItem('tangCa', JSON.stringify(danhSach)); }
        else { const local = localStorage.getItem('tangCa'); danhSach = local ? JSON.parse(local) : []; }
        hienThiBang();
      });
    }

    function hienThiBang() {
      const tuKhoa = document.getElementById('txtTimKiem').value.trim();
      const parts = tuKhoa.split(/[^0-9]+/).filter(x => x !== "");
      
      let duLieuLoc = danhSach.filter(item => {
        if (parts.length === 0) return true;
        const dateParts = item.ngay.split('-').map(x => parseInt(x, 10).toString());
        return parts.every((p, i) => dateParts[i] && dateParts[i].startsWith(p));
      });

      const tongTheoNam = {};
      duLieuLoc.forEach(item => {
        const nam = item.ngay.split('-')[0];
        if (!tongTheoNam[nam]) tongTheoNam[nam] = 0;
        tongTheoNam[nam] += parseFloat(item.gio || 0);
      });

      const tongNamDiv = document.getElementById('tongNamContainer');
      let htmlTongNam = "Tổng giờ theo năm: ";
      const danhSachNam = Object.keys(tongTheoNam).sort().reverse();
      if (danhSachNam.length > 0) {
        htmlTongNam += danhSachNam.map(nam => `${nam}: ${tongTheoNam[nam].toFixed(1)}h`).join(" | ");
      } else {
        htmlTongNam += "Không có dữ liệu.";
      }
      tongNamDiv.innerHTML = htmlTongNam;

      duLieuLoc.sort((a, b) => new Date(b.ngay) - new Date(a.ngay));
      
      const container = document.getElementById('danhSachBang');
      container.innerHTML = '';
      const theoThang = {};
      
      duLieuLoc.forEach((item) => {
        const originalIndex = danhSach.indexOf(item);
        const thang = item.ngay.substring(0, 7);
        if (!theoThang[thang]) theoThang[thang] = [];
        theoThang[thang].push({ ...item, originalIndex });
      });

      Object.keys(theoThang).sort().reverse().forEach(thang => {
        const bangHTML = document.createElement('div');
        bangHTML.innerHTML = `<div class="thang-title">Tháng: ${thang}</div><table id="tbl-${thang}"><tr><th>Ngày</th><th>Giờ</th><th>Thao tác</th></tr></table>`;
        container.appendChild(bangHTML);
        const tbl = bangHTML.querySelector('table');
        let tong = 0;
        theoThang[thang].forEach((muc) => {
          const row = tbl.insertRow();
          row.setAttribute("id", "row-" + muc.originalIndex);
          row.innerHTML = `<td>${muc.ngay}</td><td>${muc.gio}</td><td>
            <span class="btn-sua" onclick="suaDong(${muc.originalIndex})">Sửa</span> | 
            <span class="btn-xoa" onclick="xoaDong(${muc.originalIndex})">Xoá</span></td>`;
          tong += parseFloat(muc.gio);
        });
        bangHTML.innerHTML += `<div class="tong-gio">Tổng tháng ${thang}: ${tong.toFixed(1)} giờ</div>`;
      });
    }

    function themGio() {
      const ngay = document.getElementById('ngay').value;
      const gio = document.getElementById('gio').value;
      if (!ngay || !gio) return alert('Nhập đủ thông tin!');
      danhSach.push({ ngay, gio });
      luuDuLieu();
      hienThiBang();
      // Xóa dữ liệu sau khi lưu

//document.getElementById('ngay').value = "";
      document.getElementById('gio').value = "";
    }

    function xoaDong(idx) {
      if (confirm('Xoá dòng này?')) {
        danhSach.splice(idx, 1);
        luuDuLieu();
        hienThiBang();
      }
    }

    function suaDong(idx) {
      const row = document.getElementById("row-" + idx);
      const item = danhSach[idx];
      row.innerHTML = `
        <td><input type="date" id="edit-ngay" value="${item.ngay}"></td>
        <td><input type="number" id="edit-gio" value="${item.gio}" step="0.1" style="width: 80px;"></td>
        <td>
          <button onclick="luuSua(${idx})" style="font-size: 14px; padding: 5px;">Lưu</button>
          <button onclick="hienThiBang()" style="font-size: 14px; padding: 5px;">Huỷ</button>
        </td>
      `;
    }

    function luuSua(idx) {
      const ngayMoi = document.getElementById("edit-ngay").value;
      const gioMoi = document.getElementById("edit-gio").value;
      if (!ngayMoi || !gioMoi) return alert('Vui lòng nhập đầy đủ!');
      danhSach[idx] = { ngay: ngayMoi, gio: gioMoi };
      luuDuLieu();
      hienThiBang();
    }

    function xuatDuLieu() {
      const blob = new Blob([JSON.stringify(danhSach)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "du_lieu_tang_ca.json";
      a.click();
    }

    function taiDuLieuTuFile() {
      const file = document.getElementById('taiFile').files[0];
      const reader = new FileReader();
      reader.onload = (e) => {
        danhSach = JSON.parse(e.target.result);
        luuDuLieu();
        hienThiBang();
      };
      reader.readAsText(file);
    }
  </script>
</div>
</body>
</html>
