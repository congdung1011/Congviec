<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Ghi Giờ Tăng Ca</title>
  <style>
    body { font-family: Arial; font-size: 20px; padding: 5px; background: #f0f8ff; }
    input, button { margin: 5px 0; padding: 30px; width: 30%; font-size: 40px; }
    table { width: 100%; border-collapse: collapse; margin-top: 50px; font-size: 30px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
    th { background: #dff0d8; }
    .btn-xoa { color: red; cursor: pointer; font-weight: bold; }
    .thang-title {
      color: red; background: #d0e9f5; font-weight: bold;font-size: 22px; padding: 10px; margin-top: 10px;
    }
    .tong-gio {
      color: blue;
    }
  </style>
</head>
<body>
<div id="khoaMatKhau" style="text-align: center;">
  <h2>Nhập mật khẩu để mở</h2>
  <input type="password" id="matKhau" placeholder="Mật khẩu" onkeydown="if(event.key==='Enter') kiemTraMatKhau()" />
  <button onclick="kiemTraMatKhau()">Mở khóa</button>
</div>
<div id="noiDung" style="display: none;">
  <h2>Ghi Giờ Tăng Ca Hàng Ngày</h2>
  <label>Ngày:</label>
  <input type="date" id="ngay" />
  <label>Giờ tăng ca:</label>
  <input type="number" id="gio" placeholder="Nhập số giờ" min="0" step="0.1" />
  <button onclick="themGio()">Ghi lại</button>
  <button onclick="xoaTatCa()">Xoá tất cả</button>
  <br>
  <button onclick="xuatDuLieu()">Xuất dữ liệu</button>
  <input type="file" id="taiFile" accept=".json" onchange="taiDuLieuTuFile()" style="font-size: 20px; margin-left: 10px;">

  <hr>
  <h3>Tìm kiếm theo ngày</h3>
 <input type="date" id="ngayTimKiem" style="background-color: green; color: yellow; padding: 36px; font-size: 36px;" /> 
 <button onclick="timKiemNgay()" style="background-color: purple; color: white; padding: 15px; font-size: 25px;">Tìm kiếm</button> 
  <div id="ketQuaTimKiem" style="margin-top: 20px; font-size: 30px; color: brown;"></div>

  <div id="danhSachBang"></div>

    <script>
    let danhSach = [];

    // ĐƯỜNG LINK FIREBASE CỦA BẠN (Dành riêng cho mục Tăng Ca)
    const FIREBASE_URL = "https://du-lieu-uon-default-rtdb.asia-southeast1.firebasedatabase.app/tangca.json";

    function taiDuLieu() {
      const data = localStorage.getItem('tangCa');
      danhSach = data ? JSON.parse(data) : [];
    }

    function luuDuLieu() {
      localStorage.setItem('tangCa', JSON.stringify(danhSach));
      
      // Tự động đồng bộ toàn bộ danh sách mới lên mạng đám mây Firebase
      fetch(FIREBASE_URL, {
        method: "PUT",
        body: JSON.stringify(danhSach),
        headers: { "Content-Type": "application/json" }
      })
      .then(response => response.json())
      .then(() => {
        console.log("Đã đồng bộ giờ tăng ca lên mạng thành công!");
      })
      .catch(error => {
        console.error("Lỗi đồng bộ mạng:", error);
      });
    }

    // Hàm tự động tải dữ liệu từ Firebase về máy khi mở ứng dụng
    function loadDuLieuTuFirebase() {
      fetch(FIREBASE_URL)
      .then(response => response.json())
      .then(cloudData => {
        if (cloudData && Array.isArray(cloudData)) {
          localStorage.setItem('tangCa', JSON.stringify(cloudData));
          hienThiBang();
        }
      })
      .catch(error => {
        console.error("Không lấy được dữ liệu từ mạng, đang dùng dữ liệu trên máy:", error);
      });
    }

    function tachTheoThang(ds) {
      const ketQua = {};
      ds.forEach(muc => {
        const thang = muc.ngay.substring(0, 7);
        if (!ketQua[thang]) ketQua[thang] = [];
        ketQua[thang].push(muc);
      });
      return ketQua;
    }

    function hienThiBang() {
      taiDuLieu();
      danhSach.sort((a, b) => new Date(b.ngay) - new Date(a.ngay));

      const container = document.getElementById('danhSachBang');
      container.innerHTML = '';

      const theoThang = tachTheoThang(danhSach);
      const thangDaSapXep = Object.keys(theoThang).sort().reverse();

      const tongNamDict = {};

      thangDaSapXep.forEach(thang => {
        const bangHTML = document.createElement('div');
        const tieuDe = document.createElement('div');
        tieuDe.className = 'thang-title';
        const [yThang, mThang] = thang.split("-");
        tieuDe.innerText = `Tháng: ${mThang} - ${yThang}`;
        bangHTML.appendChild(tieuDe);

        const bang = document.createElement('table');
        bang.innerHTML = '<tr><th>Ngày</th><th>Giờ Tăng Ca</th><th>Xoá</th></tr>';

        let tong = 0;
        theoThang[thang]
          .sort((a, b) => new Date(b.ngay) - new Date(a.ngay))
          .forEach((muc) => {
            const indexGlobal = danhSach.indexOf(muc);
            const hang = bang.insertRow();
            const oNgay = hang.insertCell(0);
            const oGio = hang.insertCell(1);
            const oXoa = hang.insertCell(2);

            const [y, m, d] = muc.ngay.split("-");
            oNgay.textContent = `${d} - ${m} - ${y}`;
            oGio.textContent = muc.gio;

            const nutXoa = document.createElement('button');
            nutXoa.textContent = 'X';
            nutXoa.className = 'btn-xoa';
            nutXoa.onclick = function () {
              if (confirm('Bạn có thật sự muốn xoá dòng này không?') && indexGlobal !== -1) {
                xoaDong(indexGlobal);
              }
            };
            oXoa.appendChild(nutXoa);

            tong += parseFloat(muc.gio);
            if (!tongNamDict[y]) tongNamDict[y] = 0;
            tongNamDict[y] += parseFloat(muc.gio);
        });

        const tongHTML = document.createElement('div');
        tongHTML.style.marginTop = '5px';
        tongHTML.innerHTML = `<strong class="tong-gio">Tổng giờ trong tháng ${mThang} - ${yThang}: ${tong.toFixed(1)} giờ</strong>`;
        bangHTML.appendChild(bang);
        bangHTML.appendChild(tongHTML);
        container.appendChild(bangHTML);
      });

      const tongNamHTML = document.createElement('div');
      tongNamHTML.style.marginTop = '30px';
      tongNamHTML.innerHTML = '<h3 style="color:green;">Tổng số giờ tăng ca theo từng năm:</h3>';
      const danhSachNam = Object.keys(tongNamDict).sort().reverse();
      danhSachNam.forEach(nam => {
        const p = document.createElement('p');
        p.style.fontSize = '25px';
        p.innerHTML = `<strong style="color:green;">Năm ${nam}</strong>: ${tongNamDict[nam].toFixed(1)} giờ`;
        tongNamHTML.appendChild(p);
      });
      container.appendChild(tongNamHTML);
    }

    function themGio() {
      const ngay = document.getElementById('ngay').value;
      const gio = document.getElementById('gio').value;
      if (!ngay || !gio) {
        alert('Vui lòng nhập đầy đủ ngày và giờ');
        return;
      }
      danhSach.push({ ngay, gio });
      luuDuLieu();
      hienThiBang();
      document.getElementById('gio').value = '';
    }

    function xoaDong(index) {
      if (index >= 0) {
        danhSach.splice(index, 1);
        luuDuLieu();
        hienThiBang();
      }
    }

    function xoaTatCa() {
      if (confirm('Bạn có chắc chắn muốn xoá hết dữ liệu?')) {
        danhSach = [];
        localStorage.removeItem('tangCa');
        
        // Xóa hoàn toàn dữ liệu trên Firebase mạng đám mây
        fetch(FIREBASE_URL, { method: "DELETE" })
        .then(() => {
          hienThiBang();
          alert("Đã xóa sạch dữ liệu trên cả máy và mạng!");
        });
      }
    }

    function timKiemNgay() {
      const ngayCanTim = document.getElementById('ngayTimKiem').value;
      if (!ngayCanTim) {
        alert("Vui lòng chọn ngày cần tìm.");
        return;
      }

      taiDuLieu();
      const ketQua = danhSach.find(item => item.ngay === ngayCanTim);

      const hienThi = document.getElementById('ketQuaTimKiem');
      if (ketQua) {
        hienThi.innerHTML = `Ngày ${ngayCanTim.split("-").reverse().join(" - ")} có tăng ca: <strong>${ketQua.gio}</strong> giờ.`;
      } else {
        hienThi.innerHTML = `Ngày ${ngayCanTim.split("-").reverse().join(" - ")} <strong>không có</strong> giờ tăng ca.`;
      }
    }

    function xuatDuLieu() {
      taiDuLieu();
      const duLieuJSON = JSON.stringify(danhSach, null, 2);
      const blob = new Blob([duLieuJSON], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "du_lieu_tang_ca.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function taiDuLieuTuFile() {
      const fileInput = document.getElementById('taiFile');
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const duLieu = JSON.parse(e.target.result);
          if (Array.isArray(duLieu)) {
            danhSach = duLieu;
            luuDuLieu();
            hienThiBang();
            alert("Tải dữ liệu thành công!");
          } else {
            alert("Dữ liệu không hợp lệ!");
          }
        } catch (err) {
          alert("Lỗi khi đọc file: " + err.message);
        }
      };
      reader.readAsText(file);
    }

    // Khi mở trang, hiển thị bảng từ máy trước rồi tự cập nhật bản mới nhất trên Firebase về
    window.onload = function() {
      hienThiBang();
      loadDuLieuTuFirebase();
    };
  </script>

</div>
<script>
  // Hàm băm mật khẩu bằng thuật toán SHA-256
  async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function kiemTraMatKhau() {
    const nhap = document.getElementById('matKhau').value;
    const hashedInput = await sha256(nhap);
    
    // Chuỗi mã hóa SHA-256 tương ứng với mật khẩu "qqqq"
    if (hashedInput === '338ff91b2c4535359405f639077189a81e3f890cf2c7cb52199f1166cc379aa6') {
      document.getElementById('khoaMatKhau').style.display = 'none';
      document.getElementById('noiDung').style.display = 'block';
      hienThiBang();
    } else {
      alert('Sai mật khẩu!');
    }
  }
</script>
</body>
</html>
